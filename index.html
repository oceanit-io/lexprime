<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEX PRIME - Soluções Financeiras</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background-color: #0a0f1e;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 480px;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
        opacity: 0.6;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #c9a84c;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1rem;
        color: #8a9ab5;
        line-height: 1.6;
      }
      .divider {
        width: 48px;
        height: 2px;
        background: #c9a84c;
        margin: 1.5rem auto;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">⚙️</div>
      <h1>Site Temporariamente Indisponível</h1>
      <div class="divider"></div>
      <p>Estamos realizando manutenção. Em breve estaremos de volta.</p>
    </div>
  </body>
</html>
